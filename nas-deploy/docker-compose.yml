# 居所图鉴 (iHouse) — Synology NAS 部署（本地源码构建）
#
# 使用方法：
# 1. 在 NAS 上 git clone 本仓库（例如到 /volume1/docker/ihouse/）
#    git clone https://github.com/duying0425/iHouse.git /volume1/docker/ihouse
# 2. 进入 nas-deploy/ 目录：cd /volume1/docker/ihouse/nas-deploy
# 3. 首次启动：docker compose up -d --build
#    首次构建需要 3-5 分钟（pnpm build + better-sqlite3 编译）
# 4. 访问 http://<NAS_IP>:8180
#
# 更新方法（手动拉取最新代码后重建）：
#   cd /volume1/docker/ihouse && git pull && cd nas-deploy
#   docker compose build && docker compose up -d
#   本地源码有变更，Docker 会自动重新构建，无需 --no-cache。
#
# 数据持久化：SQLite 数据库 + 图片文件存放在 ./data 目录，重建容器不丢失。
# 如需备份，复制整个 data/ 目录即可。
#
# 导入已有数据：将本地 server/data/ 目录打包为 data.zip（含 home.db + images/），
#   用 File Station 上传到本目录并解压为 data/ 文件夹，再启动容器即可。
#   ⚠️ 需 home.db 和 images/ 一并拷贝，仅导入 JSON 会丢失图片。

services:
  ihouse:
    build:
      # 构建上下文 = 仓库根目录（nas-deploy 的上一级），Dockerfile 用 COPY 读取本地源码
      context: ..
      dockerfile: nas-deploy/Dockerfile
    image: ihouse:latest
    container_name: ihouse
    restart: unless-stopped
    ports:
      - "8180:3000"
    volumes:
      - ./data:/app/server/data
    environment:
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
