# 居所图鉴 (iHouse) — Docker 部署（本地源码构建）
#
# 使用方法：
# 1. 在 NAS/服务器上 git clone 本仓库
#    git clone https://github.com/duying0425/iHouse.git
# 2. 进入仓库根目录：cd iHouse
# 3. 首次启动：docker compose up -d --build
#    首次构建需要 3-5 分钟（pnpm build + better-sqlite3 编译）
# 4. 访问 http://<NAS_IP>:8180
# 完整步骤、反向代理、备份恢复与排障见 docs/deployment.md。
#
# 更新方法（手动拉取最新代码后重建）：
#   git pull && docker compose build && docker compose up -d
#   本地源码有变更，Docker 会自动重新构建，无需 --no-cache。
#
# 数据持久化：SQLite 数据库 + 图片文件存放在 ./server/data 目录，重建容器不丢失。
#   该目录已在 .gitignore / .dockerignore 中，git pull 不会影响数据。
# 完整冷备份请先停止容器再复制整个 server/data/；单房屋可在网页设置中导出 zip。
#
# 旧版升级（从单用户系统升级到多用户系统）：
#   直接 git pull && docker compose build && docker compose up -d 即可。
#   服务器首次启动时会自动检测旧版 home 表数据，并迁移到新创建的 admin 账户下。
#   默认账号：admin，默认密码会打印到 docker 容器启动日志：
#     docker compose logs ihouse | grep -A 8 "自动迁移"
#   ⚠️ 首次登录后请立即在「设置」中修改密码。
#
# 跨设备导入已有数据：将旧机的 server/data/ 目录打包（含 home.db + images/），
#   解压到新机的 server/data/ 下，再启动容器即可触发自动迁移。
#   ⚠️ 需 home.db 和 images/ 一并拷贝，仅导入 JSON 会丢失图片。
#   也可登录后在「设置」页用「导入 zip」按钮手动导入 zip 备份（含 home.json + images/）。

services:
  ihouse:
    build:
      context: .
      dockerfile: Dockerfile
    image: ihouse:latest
    container_name: ihouse
    restart: unless-stopped
    ports:
      - "8180:3000"
    volumes:
      - ./server/data:/app/server/data
    environment:
      - TZ=Asia/Shanghai
      - AI_API_BASE_URL=${AI_API_BASE_URL:-}
      - AI_API_URL=${AI_API_URL:-}
      - AI_API_KEY=${AI_API_KEY:-}
      - AI_MODEL=${AI_MODEL:-openai/gpt-5.6-sol}
      - AI_TIMEOUT_MS=${AI_TIMEOUT_MS:-60000}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
