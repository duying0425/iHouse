# 居所图鉴 (iHouse) — Docker 部署（本地源码构建）
#
# 使用方法：
# 1. 在 NAS/服务器上 git clone 本仓库
#    git clone https://github.com/duying0425/iHouse.git
# 2. 进入仓库根目录：cd iHouse
# 3. 首次启动：docker compose up -d --build
#    首次构建需要 3-5 分钟（pnpm build + better-sqlite3 编译）
# 4. 访问 http://<NAS_IP>:8180
#
# 更新方法（手动拉取最新代码后重建）：
#   git pull && docker compose build && docker compose up -d
#   本地源码有变更，Docker 会自动重新构建，无需 --no-cache。
#
# 数据持久化：SQLite 数据库 + 图片文件存放在 ./server/data 目录，重建容器不丢失。
#   该目录已在 .gitignore / .dockerignore 中，git pull 不会影响数据。
# 如需备份，复制整个 server/data/ 目录即可。
#
# 导入已有数据：将本地 server/data/ 目录打包（含 home.db + images/），
#   解压到仓库根目录的 server/data/ 下，再启动容器即可。
#   ⚠️ 需 home.db 和 images/ 一并拷贝，仅导入 JSON 会丢失图片。

services:
  ihouse:
    build:
      context: .
      dockerfile: Dockerfile
    image: ihouse:latest
    container_name: ihouse
    restart: unless-stopped
    ports:
      - "8180:3000"
    volumes:
      - ./server/data:/app/server/data
    environment:
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
