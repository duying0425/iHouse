# 居所图鉴 (iHouse) - NAS 部署用
# 在 Synology Container Manager 中导入本文件即可：
# Container Manager → 项目 → 新增 → 填入本 yaml
#
# 工作原理：build.context 为当前目录（.），docker compose 会用同目录下的
# Dockerfile 构建镜像；Dockerfile 内部会 git clone GitHub 仓库并编译。
# NAS 上只需保留本文件 + Dockerfile 两个文件（放同一目录）。
# 数据（SQLite + base64 图片）持久化在 ./data 目录，重建容器不丢失。
# 访问地址：http://<NAS_IP>:8180

services:
  ihouse:
    build:
      context: .
    image: ihouse:latest
    container_name: ihouse
    restart: unless-stopped
    ports:
      - "8180:3000"
    volumes:
      - ./data:/app/server/data
